title: "Autonomy in Surgical Robotics: A Systematic Review"
version: "1.0"
authors:
  - "Ankit Sarin, MD"
date: "2025-06-01"
prospero_id: null

pico:
  population: >-
    Studies involving autonomous or semi-autonomous surgical robotic systems
    performing physical surgical tasks on tissue, phantoms, or in-vivo models.
  intervention: >-
    Any level of surgical autonomy (Levels 1–5 per the Yang et al. taxonomy),
    ranging from robot assistance under continuous human control to fully
    autonomous task execution.
  comparator: >-
    Human-controlled (teleoperated) surgical systems, manual surgery,
    or no comparator.
  outcomes:
    - Task accuracy or error rate
    - Task completion time
    - Safety events (tissue damage, unplanned stops, collisions)
    - Autonomy level achieved (Yang et al. Level 1–5)
    - Surgeon workload or cognitive load metrics

search_strategy:
  databases:
    - PubMed
    - OpenAlex
  query_terms:
    - '("surgical robot" OR "robotic surgery" OR "surgical automation" OR "medical robot" OR "medical robotics" OR "robotic surgical")'
    - '("autonomous" OR "autonomy" OR "self-directed" OR "automated")'
  date_range: [2010, 2025]

screening_models:
  primary: "qwen3:8b"
  verification: "gemma3:27b"

screening_criteria:
  inclusion:
    - English language
    - Peer-reviewed original research (journal article or full conference paper)
    - Involves a physical surgical task (cadaver, phantom, animal, or human)
    - "Must involve an autonomous or semi-autonomous robotic component that CONTROLS or DIRECTS a physical robot to execute a surgical action (not purely teleoperated or manual)"
    - "Simulation studies included ONLY IF they demonstrate or evaluate autonomous/semi-autonomous robotic behavior in the simulation (not simulation frameworks, physics engines, or virtual environments described without autonomous robot behavior)"
    - Published between 2010 and 2025
  exclusion:
    - Systematic reviews, meta-analyses, or scoping reviews
    - Editorials, commentaries, or letters to the editor
    - Conference abstracts without full paper
    - "Non-surgical robotics (industrial, warehouse, rehabilitation, exoskeletons, prosthetics, assistive devices)"
    - "Purely teleoperated/master-slave robotic surgery where the human directly controls all robot movements in real-time (e.g., standard da Vinci case series, joystick-controlled systems). There must be an autonomous or semi-autonomous component where the system makes independent decisions about motion, planning, or execution."
    - "ML/CV methodology papers that only analyze, classify, segment, track, or predict surgical data (video, images, sensor data) without controlling a robot to execute a surgical action"
    - Studies with no autonomous or semi-autonomous component
    - "Papers with no abstract or insufficient information to determine eligibility — do not default to inclusion when evidence is absent"

extraction_schema:
  fields:
    # ── Tier 1: Explicit (stated directly in text, expected κ > 0.90) ──
    - name: study_type
      description: "The type of study. Look at the methods section for explicit statements like 'prospective,' 'retrospective,' 'randomized.' If unclear, classify based on the overall design."
      type: categorical
      tier: 1
      enum_values: ["Original Research", "Case Report/Series", "Review", "Systematic Review", "Meta-Analysis", "Commentary/Editorial", "Technical Note", "Conference Abstract", "NR"]

    - name: robot_platform
      description: "The specific robotic system(s) used. Record the full commercial name as stated in the paper. If multiple platforms, separate with semicolons. If custom/experimental, record 'Custom' followed by any name given."
      type: text
      tier: 1

    - name: task_performed
      description: "The specific surgical task or procedure the autonomous/semi-autonomous system performed. Use the paper's own terminology. If multiple tasks, list the primary one first."
      type: text
      tier: 1

    - name: sample_size
      description: "The number of cases, trials, procedures, or subjects. Record the number with brief context. For animal/phantom studies, record the number of trials or specimens."
      type: text
      tier: 1

    - name: country
      description: "The country where the study was conducted. Look for institutional affiliations in the author list or methods section. If multi-country, list all separated by semicolons. If unclear, record 'NR'."
      type: text
      tier: 1

    # ── Tier 2: Interpretive (vocabulary mapping, expected κ 0.70–0.85) ──
    - name: autonomy_level
      description: "The highest level of autonomy demonstrated, mapped to the Yang et al. (2017) classification. Level 0 = no autonomy (teleoperation). Level 1 = robot provides assistance. Level 2 = task autonomy. Level 3 = conditional autonomy. Level 4 = high autonomy. Level 5 = full autonomy. If the paper does not use this framework, map their description to the closest level."
      type: categorical
      tier: 2
      enum_values: ["Level 0", "Level 1", "Level 2", "Level 3", "Level 4", "Level 5", "NR"]

    - name: validation_setting
      description: "The experimental setting in which the system was tested. Choose the most specific applicable option."
      type: categorical
      tier: 2
      enum_values: ["Simulation only", "Phantom/bench model", "Ex vivo tissue", "In vivo animal", "Cadaver", "Human clinical trial", "Human clinical (non-trial)", "Multiple settings", "NR"]

    - name: human_oversight_model
      description: "How human oversight was maintained during autonomous task execution. Focus on what the human could do to intervene, not just whether they were present."
      type: categorical
      tier: 2
      enum_values: ["Direct teleoperation (no autonomy)", "Shared control", "Supervisory with manual override", "Supervisory with emergency stop only", "Monitoring only (no intervention capability)", "No human oversight described", "NR"]

    - name: fda_status
      description: "The FDA regulatory status of the robotic platform or autonomous system. Look for explicit FDA clearance/approval statements. 510(k) is clearance, PMA is approval — they are different regulatory pathways."
      type: categorical
      tier: 2
      enum_values: ["FDA 510(k) cleared", "FDA PMA approved", "FDA breakthrough designation", "Investigational/IDE", "CE marked (non-US)", "Not FDA cleared/approved", "Not discussed", "NR"]

    - name: study_design
      description: "The formal research design or methodological framework. This is about HOW the study was conducted, not WHAT it studied. If the paper describes a machine learning pipeline, classify the validation approach."
      type: categorical
      tier: 2
      enum_values: ["Randomized controlled trial", "Non-randomized comparative", "Prospective cohort", "Retrospective cohort", "Case-control", "Cross-sectional", "Case report/series", "Systematic review", "Algorithm development and validation", "Bench/phantom study", "Simulation study", "Expert opinion/commentary", "NR"]

    # ── Tier 3: Numeric/Tables (from results, variable expected κ) ──
    - name: primary_outcome_metric
      description: "The main outcome measure reported. Use the paper's exact terminology for the metric name (e.g., 'task completion time,' 'suture accuracy score,' 'Dice coefficient'). If multiple outcomes, record the one the authors emphasize as primary."
      type: text
      tier: 3

    - name: primary_outcome_value
      description: "The numerical result for the primary outcome metric. Include the value, units, and statistical context (e.g., 'mean 4.2 ± 0.8 mm', '92.3% (95% CI: 88.1–96.5)', 'median 12 min (IQR 8–15)'). Record exactly as reported."
      type: text
      tier: 3

    - name: comparison_to_human
      description: "How the autonomous system's performance compared to human/manual performance, if reported. Include the comparison metric and direction (e.g., 'Autonomous 23% faster than manual (p<0.01)', 'No significant difference in accuracy (p=0.34)'). If no comparison was made, record 'No comparison reported'."
      type: text
      tier: 3

    # ── Tier 4: Judgment (synthesis/inference, expected κ 0.50–0.70) ──
    - name: key_limitation
      description: "What is the biggest threat to validity? Summarize in 1-2 sentences in your own words, drawing from the authors' limitations section and your own assessment of the study design."
      type: text
      tier: 4

    - name: clinical_readiness_assessment
      description: "YOUR JUDGMENT: Based on the totality of evidence in this paper, how close is the described technology to clinical use in patients? This field has no right answer in the text — it requires you to synthesize the results, limitations, and setting."
      type: categorical
      tier: 4
      enum_values: ["Ready for clinical use", "Approaching clinical readiness", "Early-stage research", "Proof of concept only", "Not assessable"]
