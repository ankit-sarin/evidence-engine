title: "Autonomy in Surgical Robotics: A Systematic Review"
version: "1.0"
authors:
  - "Ankit Sarin, MD"
date: "2025-06-01"
prospero_id: null

pico:
  population: >-
    Studies involving autonomous or semi-autonomous surgical robotic systems
    performing physical surgical tasks on tissue, phantoms, or in-vivo models.
  intervention: >-
    Any level of surgical autonomy (Levels 1–5 per the Yang et al. taxonomy),
    ranging from robot assistance under continuous human control to fully
    autonomous task execution.
  comparator: >-
    Human-controlled (teleoperated) surgical systems, manual surgery,
    or no comparator.
  outcomes:
    - Task accuracy or error rate
    - Task completion time
    - Safety events (tissue damage, unplanned stops, collisions)
    - Autonomy level achieved (Yang et al. Level 1–5)
    - Surgeon workload or cognitive load metrics

search_strategy:
  databases:
    - PubMed
    - OpenAlex
  query_terms:
    - '("surgical robot" OR "robotic surgery" OR "surgical automation" OR "medical robot" OR "medical robotics" OR "robotic surgical")'
    - '("autonomous" OR "autonomy" OR "self-directed" OR "automated")'
  date_range: [2010, 2025]

unpaywall_email: "axsarin@health.ucdavis.edu"
# Proxy URL patterns vary by institution. Requires browser-level VPN/SSO to work.
# The manual download list also generates Google Scholar, Direct DOI, and PubMed links.
institutional_proxy_pattern: "https://doi-org.libproxy.ucdavis.edu/{doi}"

screening_models:
  primary: "qwen3:8b"
  verification: "gemma3:27b"

ft_screening_models:
  primary: "qwen3:32b"
  verifier: "gemma3:27b"
  think: false
  temperature: 0

low_yield_threshold: 4

pdf_quality_check:
  enabled: true
  ai_model: "qwen2.5vl:7b"
  dpi: 150
  timeout: 120
  exclude_reasons:
    - NON_ENGLISH
    - NOT_MANUSCRIPT
    - INACCESSIBLE
    - OTHER

specialty_scope:
  included:
    - abdominal surgery  # colorectal, foregut, HPB, pancreas, general
    - gynecologic surgery
    - urologic surgery
    - thoracic surgery
    - general surgery
    - head and neck surgery  # including TORS
    - bench/preclinical autonomy  # suturing, knot-tying, tissue manipulation, instrument movement, phantom/cadaver
  excluded:
    - dental surgery
    - oral and maxillofacial surgery
    - ophthalmic surgery  # retinal, cataract
    - orthopedic surgery  # unless bench autonomy task
    - dermatologic surgery
    - neurosurgery  # unless bench autonomy task
  notes: >
    Papers describing bench/preclinical autonomous tasks (e.g., suturing,
    knot-tying on phantoms) are included regardless of the specialty context,
    as these represent generalizable autonomous capabilities.
    Orthopedic and neurosurgery papers are excluded only when the autonomous
    task is specialty-specific (e.g., autonomous bone drilling, stereotactic
    targeting). If the paper describes a generalizable autonomous task
    performed in an orthopedic or neurosurgical context, include it.

screening_criteria:
  inclusion:
    - English language
    - Peer-reviewed original research (journal article or full conference paper)
    - Involves a physical surgical task (cadaver, phantom, animal, or human)
    - "Must involve an autonomous or semi-autonomous robotic component that CONTROLS or DIRECTS a physical robot to execute a surgical action (not purely teleoperated or manual)"
    - "Simulation studies included ONLY IF they demonstrate or evaluate autonomous/semi-autonomous robotic behavior in the simulation (not simulation frameworks, physics engines, or virtual environments described without autonomous robot behavior)"
    - Published between 2010 and 2025
  exclusion:
    - Systematic reviews, meta-analyses, or scoping reviews
    - Editorials, commentaries, or letters to the editor
    - Conference abstracts without full paper
    - "Non-surgical robotics (industrial, warehouse, rehabilitation, exoskeletons, prosthetics, assistive devices)"
    - "Purely teleoperated/master-slave robotic surgery where the human directly controls all robot movements in real-time (e.g., standard da Vinci case series, joystick-controlled systems). There must be an autonomous or semi-autonomous component where the system makes independent decisions about motion, planning, or execution."
    - "ML/CV methodology papers that only analyze, classify, segment, track, or predict surgical data (video, images, sensor data) without controlling a robot to execute a surgical action"
    - Studies with no autonomous or semi-autonomous component
    - "Papers with no abstract or insufficient information to determine eligibility — do not default to inclusion when evidence is absent"

extraction_schema:
  fields:
    # ── Tier 1: Explicit (stated directly in text, expected κ > 0.90) ──
    - name: study_type
      description: "The type of study as described in the methods section. Look for explicit statements like 'prospective study,' 'case series,' etc."
      type: categorical
      tier: 1
      enum_values: ["Original Research", "Case Report/Series", "Review", "Systematic Review", "Meta-Analysis", "Conference Abstract", "Technical Report", "Other"]

    - name: robot_platform
      description: "The name/model of the robotic system used, including manufacturer if stated. Record exactly as the paper states it. If multiple robots are compared, list all separated by semicolons. If the paper describes an algorithm without a physical platform, enter 'No physical platform — [brief descriptor]'. If a generic robot arm not designed for surgery (e.g., KUKA LBR iiwa), record as stated."
      type: text
      tier: 1

    - name: task_performed
      description: "The specific surgical task the robot performed autonomously or semi-autonomously. Record the specific autonomous task, not the overall procedure — e.g. 'suturing' not 'colectomy'. Be specific: 'needle driving' not 'surgery'. If multiple autonomous tasks, list all separated by semicolons."
      type: text
      tier: 1

    - name: sample_size
      description: "Total number of cases, experiments, procedures, or subjects. For animal studies, report number of animals. For simulations, report number of trials. For phantom studies, report number of experimental runs. Enter the number only, or NR."
      type: text
      tier: 1

    - name: surgical_domain
      description: "The surgical specialty or application area the autonomous task applies to. If testing on a bench model without specific clinical specialty context, use 'Non-clinical Bench / Phantom'. If purely computational with no physical experiment, use 'Computational / Simulation Only'. If explicitly testing across multiple specialties, use 'Multiple'."
      type: categorical
      tier: 1
      enum_values: ["General Surgery", "Urology", "Gynecology", "Cardiac/Thoracic", "Head & Neck / ENT", "Vascular", "Non-clinical Bench / Phantom", "Computational / Simulation Only", "Multiple", "Other"]

    # ── Tier 2: Interpretive (vocabulary mapping, expected κ 0.70–0.85) ──
    - name: autonomy_level
      description: "The highest level of autonomy demonstrated, mapped to the Yang et al. (2017) classification. Level 0 = no autonomy (teleoperation). Level 1 = robot assistance (tremor filtration, haptic feedback, virtual fixtures). Level 2 = task autonomy (robot executes specific preprogrammed tasks, surgeon initiates and monitors). Level 3 = conditional autonomy (robot generates strategies for surgeon to select). Level 4 = high autonomy (robot makes decisions and executes independently, surgeon supervises). Level 5 = full autonomy (no human intervention). If the paper does not use this framework, map their description using the decision tree. For algorithms/simulations, classify based on what the system demonstrates. Use 'Mixed/Multiple' only when paper explicitly tests multiple distinct autonomy levels."
      type: categorical
      tier: 2
      enum_values: ["0 (No autonomy)", "1 (Robot assistance)", "2 (Task autonomy)", "3 (Conditional autonomy)", "4 (High autonomy)", "5 (Full autonomy)", "Mixed/Multiple", "NR"]

    - name: validation_setting
      description: "The experimental setting in which the autonomous capability was tested. Select the most advanced setting if multiple were used. Hierarchy: human > animal > cadaver > ex vivo > phantom > simulation > computational."
      type: categorical
      tier: 2
      enum_values: ["In vivo (human)", "In vivo (animal)", "Ex vivo", "Phantom/Simulation", "Cadaver", "Computational/Virtual", "Mixed", "NR"]

    - name: task_monitor
      description: "Who observes the surgical environment and gathers information during the task? H = surgeon visually observes/interprets (robot has no independent perception). R = robot autonomously senses via cameras/force sensors/imaging without human input. Shared = both independently gather and interpret information. NR = not described."
      type: categorical
      tier: 2
      enum_values: ["H", "R", "Shared", "NR"]

    - name: task_generate
      description: "Who creates the plan or strategy for how the task will be performed (trajectory, action sequence, parameters, surgical strategy)? H = surgeon defines all task parameters. R = system computes plan autonomously from data. Shared = both contribute (e.g., surgeon defines target anatomy, robot generates trajectory). NR = not described."
      type: categorical
      tier: 2
      enum_values: ["H", "R", "Shared", "NR"]

    - name: task_select
      description: "Who chooses which plan to execute when alternatives exist? H = surgeon reviews options and authorizes a specific plan. R = system autonomously selects from its own generated options (also use R when system generates a single plan and executes it — no selection step). Shared = both have selection authority. NR = not described."
      type: categorical
      tier: 2
      enum_values: ["H", "R", "Shared", "NR"]

    - name: task_execute
      description: "Who physically carries out the surgical action? H = surgeon directly controls all instrument movements (standard teleoperation). R = system performs the physical action autonomously. Shared = both contribute simultaneously (e.g., cooperative control, active constraints). NR = not described."
      type: categorical
      tier: 2
      enum_values: ["H", "R", "Shared", "NR"]

    - name: system_maturity
      description: "The technology readiness level of what the paper actually demonstrates."
      type: categorical
      tier: 2
      enum_values:
        - "Commercial clinical system"
        - "Commercial system + research autonomy"
        - "Research prototype (hardware)"
        - "Algorithm on existing platform"
        - "Simulation / computational only"
        - "Conceptual / framework"

    - name: study_design
      description: "The specific study design, more granular than study_type. This is about HOW the study was conducted, not WHAT it studied. If a paper demonstrates a new algorithm on a phantom, classify based on emphasis (initial technical demonstration vs algorithm development)."
      type: categorical
      tier: 2
      enum_values:
        - "Initial technical demonstration"
        - "Feasibility study"
        - "Comparative study (vs. human or alternative)"
        - "Preclinical validation (animal/cadaver)"
        - "Clinical pilot / first-in-human"
        - "Randomized controlled trial"
        - "Retrospective clinical review"
        - "Algorithm development and evaluation"
        - "Systematic review / meta-analysis"
        - "Other"

    - name: country
      description: "Country where the study was conducted. Use first author's institution country if not explicitly stated. Metadata-inferred is acceptable. If multi-country, list all separated by semicolons. If unclear, record 'NR'."
      type: text
      tier: 2

    # ── Tier 3: Numeric/Tables (from results, variable expected κ) ──
    - name: primary_outcome_metric
      description: "The primary outcome measure reported. Record the first quantitative outcome in the results section related to the autonomous task's performance. Use the paper's exact terminology (e.g., 'task completion time,' 'suture accuracy score,' 'Dice coefficient'). Do not select based on judgment of 'most emphasized' — use positional order."
      type: text
      tier: 3

    - name: primary_outcome_value
      description: "The numeric result for the primary outcome metric. Include units, confidence intervals, or p-values if reported. Copy the exact numeric reporting (e.g., 'mean 4.2 ± 0.8 mm', '92.3% (95% CI: 88.1–96.5)', 'median 12 min (IQR 8–15)')."
      type: text
      tier: 3

    - name: comparison_to_human
      description: "If the paper compares autonomous performance to human/manual performance, report the comparison result. Include both values if available (e.g., 'Autonomous: 142s vs Manual: 198s (p=0.003)'). If no comparison was made, record 'No comparison reported'."
      type: text
      tier: 3

    - name: secondary_outcomes
      description: "Additional quantitative outcomes reported beyond the primary. Record as semicolon-separated entries in format 'metric: value'. Enter NR if only one outcome reported."
      type: text
      tier: 3

    # ── Tier 4: Judgment (synthesis/inference, expected κ 0.50–0.70) ──
    - name: key_limitation
      description: "The most important limitation of the study. In 1-2 sentences, state the key limitation using YOUR judgment. Do not simply copy what the authors wrote in their limitations section. Quote the passage(s) that informed your assessment."
      type: text
      tier: 4

    - name: clinical_readiness_assessment
      description: "YOUR JUDGMENT: Based on the totality of evidence in this paper, how close is the described technology to clinical use in patients? This field has no right answer in the text — it requires you to synthesize the results, limitations, and setting. Quote the key evidence behind your judgment."
      type: categorical
      tier: 4
      enum_values: ["Ready for clinical use", "Approaching clinical readiness", "Early-stage research", "Proof of concept only", "Not assessable"]
